<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SeeleScans — catálogo y lector de mangas." />
  <title>SeeleScans</title>
  <link rel="icon" type="image/png" href="assets/SeeleScans.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>

  <header class="site-header" id="site-header">
    <div class="header-inner container">
      <a href="#/" class="brand" aria-label="Ir al inicio de SeeleScans">
        <img src="assets/SeeleScans.png" alt="" class="brand__logo" width="56" height="56" />
        <span class="brand__text">
          <span class="brand__main">Seele</span>
          <span class="brand__sub">Scans</span>
        </span>
        <span class="brand__tag" aria-hidden="true">// catálogo</span>
      </a>

      <nav class="header-nav" aria-label="Acciones">
        <button id="new-btn" class="btn btn--primary btn--new" type="button" hidden>
          <span aria-hidden="true">+</span> Nuevo
        </button>
        <button id="admin-toggle" class="admin-toggle" type="button" role="switch" aria-checked="false">
          <span class="admin-toggle__rail">
            <span class="admin-toggle__knob"></span>
          </span>
          <span class="admin-toggle__label">Admin</span>
        </button>
      </nav>
    </div>
    <div class="header-stripe" aria-hidden="true"></div>
  </header>

  <main id="main" class="main container">
    <section id="view-home" class="view view--home" data-view="home"></section>
    <section id="view-detail" class="view view--detail" data-view="detail" hidden></section>
    <section id="view-reader" class="view view--reader" data-view="reader" hidden></section>
    <section id="view-form" class="view view--form" data-view="form" hidden></section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p class="site-footer__line">SeeleScans · Catálogo de mangas</p>
      <p class="site-footer__line site-footer__line--soft">API en <code>http://localhost:3000</code></p>
    </div>
  </footer>

  <div
    id="toast-container"
    class="toast-container"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></div>

  <div id="loading-overlay" class="loading-overlay" hidden aria-hidden="true">
    <div class="loading-spinner" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <p class="loading-text">Cargando…</p>
  </div>

  <div id="modal-root" class="modal-root" hidden aria-hidden="true"></div>

  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
